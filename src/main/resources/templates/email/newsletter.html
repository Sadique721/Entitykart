<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntityKart Newsletter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #f1f3f6; padding: 20px; }
        .email-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #2874f0 0%, #1e5fd8 100%); padding: 30px; text-align: center; color: white; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .content { padding: 30px; }
        .unsubscribe { font-size: 11px; color: #718096; text-align: center; margin-top: 20px; }
        .footer { background: #f8fafc; padding: 20px; text-align: center; border-top: 1px solid #e2e8f0; font-size: 12px; color: #718096; }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1>📧 EntityKart Newsletter</h1>
            <p>Stay updated with the latest offers</p>
        </div>
        
        <div class="content">
            <p>Hello <strong th:text="${user.name}">Customer</strong>,</p>
            <div th:utext="${content}">Newsletter content here</div>
            
            <div class="unsubscribe">
                <a href="#" th:href="${unsubscribeUrl}" style="color: #718096;">Unsubscribe</a> from future newsletters.
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 EntityKart. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
