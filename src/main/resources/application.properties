spring.application.name=Entitykart

# Server port – Render provides $PORT, fallback 10000
server.port=${PORT:10000}

# JSP views
spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/

# Database – placeholders from environment variables with Aiven MySQL fallbacks
spring.datasource.url=jdbc:mysql://${DB_HOST:entitkart-mdsadiqueamin721786-entitykart.a.aivencloud.com}:${DB_PORT:20904}/${DB_NAME:defaultdb}?useSSL=true&sslMode=REQUIRED&connectTimeout=30000&socketTimeout=60000
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_0FjN-hs9_dDr4pJEKbG}

# Actuator endpoints (health check)
management.endpoints.web.base-path=/
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Hibernate optimisations
# Schema is already initialized on Aiven MySQL, validate to speed up startup
spring.jpa.hibernate.ddl-auto=validate
# Set to true in production/debugging to see schema creation progress
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.tool.schema=DEBUG
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Connection pool (reduced for memory)
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.auto-commit=false

# Mail (Gmail with App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Prevent startup hang
spring.mail.test-connection=false

# File upload limits
server.tomcat.max-part-count=30
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Lazy initialisation DISABLED - heavy beans (Hibernate, JPA, Mail) load eagerly during startup
# to ensure database connectivity issues are logged immediately
spring.main.lazy-initialization=false

# Tomcat memory and thread tuning for Render free tier (512MB RAM limit)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100
server.tomcat.accept-count=10

# JSP compilation hints
server.servlet.jsp.check-classes-sources=false

# Skip TLD scanning for jars that don't contain JSTL/tag libraries (saves boot time
# without breaking JSTL <c:...> tags used in JSP views)
server.tomcat.additional-tld-skip-patterns=spring-*.jar,hibernate-*.jar,mysql-*.jar,HikariCP-*.jar,jackson-*.jar,poi-*.jar,cloudinary-*.jar,anet-*.jar,jaxb-*.jar,activation-*.jar,dotenv-*.jar,tomcat-embed-*.jar,spring-security-*.jar
