#max request data count 
server.tomcat.max-part-count=30
# Maximum size for a single file (e.g., 10MB)
spring.servlet.multipart.max-file-size=10MB
# Maximum size for the entire request (e.g., 12MB)
spring.servlet.multipart.max-request-size=12MB

# Disable Open EntityManager in View – releases connections immediately after query
spring.jpa.open-in-view=false

# Increase connection pool size (optional, depends on your database limits)
spring.datasource.hikari.maximumPoolSize=20
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

