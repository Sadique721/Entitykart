spring.application.name=Entitykart

# Server port – Render provides $PORT, fallback 9999
server.port=${PORT:9999}

# JSP views
spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/

# Database – placeholders from environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?connectTimeout=30000&socketTimeout=60000
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Actuator endpoints (health check)
management.endpoints.web.base-path=/
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Hibernate optimisations
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate   # Change to 'update' only if schema changes
spring.jpa.show-sql=false                # Set to false in production
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Connection pool (reduced for memory)
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

# Mail (Gmail with App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.test-connection=false   # Prevent startup hang

# File upload limits
server.tomcat.max-part-count=30
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Lazy initialisation disabled - eager init avoids slow first-request (health check timeout)
spring.main.lazy-initialization=false

# JSP compilation hints
server.servlet.jsp.check-classes-sources=false
