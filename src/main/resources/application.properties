spring.application.name=Entitykart

# Server port – Render provides $PORT, fallback 10000
server.port=${PORT:10000}

# JSP views
spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/

# Database – placeholders from environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?connectTimeout=30000&socketTimeout=60000
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Actuator endpoints (health check)
management.endpoints.web.base-path=/
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Hibernate optimisations
# Change to 'update' only if schema changes
spring.jpa.hibernate.ddl-auto=validate
# Set to false in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Connection pool (reduced for memory)
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.auto-commit=false

# Mail (Gmail with App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Prevent startup hang
spring.mail.test-connection=false

# File upload limits
server.tomcat.max-part-count=30
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Lazy initialisation ENABLED - Tomcat/port opens fast first,
# heavy beans (Hibernate, JPA, Mail) load lazily on first request
spring.main.lazy-initialization=true

# JSP compilation hints
server.servlet.jsp.check-classes-sources=false

# Skip TLD scanning of jars - saves 25-30 seconds on boot (Jasper TldScanner)
server.tomcat.additional-tld-skip-patterns=*.jar
